<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Type Effectiveness</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inconsolata:wght@400;700&display=swap');

  :root {
    --bg: #0d0f14;
    --panel: #14171f;
    --border: #2a2f3d;
    --accent: #2a8fc4;
    --accent2: #e8533a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --output-bg: #0a0c10;

    /* Type colors */
    --bug: #8cb230;
    --dark: #58575f;
    --dragon: #0f6ac0;
    --electric: #eed535;
    --fairy: #ed6ec7;
    --fighting: #c12239;
    --fire: #fd7d24;
    --flying: #748fc9;
    --ghost: #4a3f9f;
    --grass: #5db025;
    --ground: #d3a343;
    --ice: #61cec0;
    --normal: #9da0aa;
    --poison: #a552cc;
    --psychic: #ea5c8e;
    --rock: #b69e31;
    --steel: #417d9a;
    --water: #4a90d9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inconsolata', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.07) 3px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    width: 100%;
    max-width: 680px;
    margin-bottom: 1rem;
  }

  .card-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Type grid */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 0.5rem;
  }

  .type-btn {
    padding: 0.6rem 0.5rem;
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.05);
    color: var(--text);
    transition: all 0.12s ease;
    text-align: center;
  }
  .type-btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
  .type-btn.active {
    border-color: currentColor;
    filter: brightness(1.15);
    box-shadow: 0 0 12px currentColor;
  }

  /* Assign type colors */
  .type-btn[data-type="bug"]      { color: var(--bug); }
  .type-btn[data-type="dark"]     { color: var(--dark); }
  .type-btn[data-type="dragon"]   { color: var(--dragon); }
  .type-btn[data-type="electric"] { color: var(--electric); }
  .type-btn[data-type="fairy"]    { color: var(--fairy); }
  .type-btn[data-type="fighting"] { color: var(--fighting); }
  .type-btn[data-type="fire"]     { color: var(--fire); }
  .type-btn[data-type="flying"]   { color: var(--flying); }
  .type-btn[data-type="ghost"]    { color: var(--ghost); }
  .type-btn[data-type="grass"]    { color: var(--grass); }
  .type-btn[data-type="ground"]   { color: var(--ground); }
  .type-btn[data-type="ice"]      { color: var(--ice); }
  .type-btn[data-type="normal"]   { color: var(--normal); }
  .type-btn[data-type="poison"]   { color: var(--poison); }
  .type-btn[data-type="psychic"]  { color: var(--psychic); }
  .type-btn[data-type="rock"]     { color: var(--rock); }
  .type-btn[data-type="steel"]    { color: var(--steel); }
  .type-btn[data-type="water"]    { color: var(--water); }

  .type-btn.active[data-type="bug"]      { background: rgba(140,178,48,0.2); }
  .type-btn.active[data-type="dark"]     { background: rgba(88,87,95,0.25); }
  .type-btn.active[data-type="dragon"]   { background: rgba(15,106,192,0.2); }
  .type-btn.active[data-type="electric"] { background: rgba(238,213,53,0.2); }
  .type-btn.active[data-type="fairy"]    { background: rgba(237,110,199,0.2); }
  .type-btn.active[data-type="fighting"] { background: rgba(193,34,57,0.2); }
  .type-btn.active[data-type="fire"]     { background: rgba(253,125,36,0.2); }
  .type-btn.active[data-type="flying"]   { background: rgba(116,143,201,0.2); }
  .type-btn.active[data-type="ghost"]    { background: rgba(74,63,159,0.2); }
  .type-btn.active[data-type="grass"]    { background: rgba(93,176,37,0.2); }
  .type-btn.active[data-type="ground"]   { background: rgba(211,163,67,0.2); }
  .type-btn.active[data-type="ice"]      { background: rgba(97,206,192,0.2); }
  .type-btn.active[data-type="normal"]   { background: rgba(157,160,170,0.2); }
  .type-btn.active[data-type="poison"]   { background: rgba(165,82,204,0.2); }
  .type-btn.active[data-type="psychic"]  { background: rgba(234,92,142,0.2); }
  .type-btn.active[data-type="rock"]     { background: rgba(182,158,49,0.2); }
  .type-btn.active[data-type="steel"]    { background: rgba(65,125,154,0.2); }
  .type-btn.active[data-type="water"]    { background: rgba(74,144,217,0.2); }

  .selected-display {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
    min-height: 2rem;
    align-items: center;
  }

  .type-tag {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    border: 1px solid currentColor;
  }

  .none-selected {
    color: var(--muted);
    font-size: 0.8rem;
    font-style: italic;
  }

  /* Mode toggle */
  .mode-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.3rem;
  }

  .mode-btn {
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--muted);
    font-family: 'Inconsolata', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.12s;
  }
  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(247,201,72,0.08);
  }

  /* GO button */
  .go-btn {
    display: block;
    width: 100%;
    max-width: 680px;
    padding: 0.9rem;
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 1rem;
  }
  .go-btn:hover { background: #3aa8e0; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(42,143,196,0.3); }
  .go-btn:active { transform: translateY(0); }

  /* Output */
  .output-card {
    background: var(--output-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem;
    width: 100%;
    max-width: 680px;
    margin-bottom: 0.75rem;
    display: none;
  }
  .output-card.visible { display: block; }

  .output-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .output-string {
    font-family: 'Inconsolata', monospace;
    font-size: 0.8rem;
    color: #a8f0c8;
    word-break: break-all;
    line-height: 1.6;
    background: rgba(168,240,200,0.04);
    border: 1px solid rgba(168,240,200,0.1);
    border-radius: 3px;
    padding: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .output-types {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 0.75rem;
  }

  .copy-btn {
    padding: 0.4rem 1rem;
    border: 1px solid var(--accent2);
    border-radius: 3px;
    background: transparent;
    color: var(--accent2);
    font-family: 'Inconsolata', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.05em;
  }
  .copy-btn:hover { background: rgba(232,83,58,0.1); }
  .copy-btn.copied { border-color: #62bb5b; color: #62bb5b; background: rgba(98,187,91,0.08); }

  .effectiveness-note {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1rem 0;
  }
</style>
</head>
<body>

<!-- POKEMON LOOKUP -->
<div class="card" style="margin-bottom:0.75rem;">
  <select id="pkmnSelect" onchange="pkmnSelected(this)" style="width:100%;background:var(--output-bg);color:var(--text);border:1px solid var(--border);border-radius:3px;padding:0.6rem 0.5rem;font-family:'Inconsolata',monospace;font-size:0.9rem;appearance:auto;">
    <option value="">— Select a Pokémon —</option>
  </select>
</div>

<!-- TYPE SELECTOR -->
<div class="card">

<div style="display:flex;gap:0.75rem;width:100%;max-width:680px;margin-bottom:1rem;">

</div>

<!-- OUTPUT CARD: SUPER EFFECTIVE -->
<div class="output-card" id="outCard1">

});

// Populate dropdown
const sel = document.getElementById('pkmnSelect');

  sel.appendChild(opt);
});

function pkmnSelected(selectEl) {
  if (selectEl.value === '') return;
  const pkmn = DEDUPED_LIST[parseInt(selectEl.value)];
  selectedTypes = [...pkmn.t];
  updateSelectedDisplay();
}

// effectivenessTable[attacking][defending] = multiplier
// Simplified: using standard Gen 6+ chart, ignoring immunities for PoGo (PoGo has no 0x, uses 0.39x instead)
// We represent effectiveness as: 2=super (2x), 1=normal (1x), 0.5=not very (0.5x)
// For dual types the multipliers stack.
const chart = {
  bug:      {dark:2,fairy:0.5,fighting:0.5,fire:0.5,flying:0.5,ghost:0.5,grass:2,ground:1,ice:1,normal:1,poison:0.5,psychic:2,rock:1,steel:0.5,water:1,bug:1,dragon:1,electric:1},
  dark:     {dark:0.5,fairy:0.5,fighting:0.5,ghost:2,psychic:2,bug:1,dragon:1,electric:1,fire:1,flying:1,grass:1,ground:1,ice:1,normal:1,poison:1,rock:1,steel:1,water:1},
  dragon:   {dragon:2,fairy:0.5,steel:0.5,bug:1,dark:1,electric:1,fighting:1,fire:1,flying:1,ghost:1,grass:1,ground:1,ice:1,normal:1,poison:1,psychic:1,rock:1,water:1},
  electric: {dragon:0.5,electric:0.5,flying:2,grass:0.5,ground:0,water:2,bug:1,dark:1,fairy:1,fighting:1,fire:1,ghost:1,ice:1,normal:1,poison:1,psychic:1,rock:1,steel:1},
  fairy:    {dark:2,dragon:2,fighting:2,fire:0.5,poison:0.5,steel:0.5,bug:1,electric:1,fairy:1,flying:1,ghost:1,grass:1,ground:1,ice:1,normal:1,psychic:1,rock:1,water:1},
  fighting: {bug:0.5,dark:2,fairy:0.5,flying:0.5,ghost:0,ice:2,normal:2,poison:0.5,psychic:0.5,rock:2,steel:2,dragon:1,electric:1,fighting:1,fire:1,grass:1,ground:1,water:1},
  fire:     {bug:2,fairy:1,grass:2,ice:2,rock:0.5,steel:2,water:0.5,dragon:0.5,fire:0.5,bug:2,dark:1,electric:1,fighting:1,flying:1,ghost:1,ground:1,normal:1,poison:1,psychic:1},
  flying:   {bug:2,electric:0.5,fighting:2,grass:2,ground:1,rock:0.5,steel:0.5,dark:1,dragon:1,fairy:1,fire:1,flying:1,ghost:1,ice:1,normal:1,poison:1,psychic:1,water:1},
  ghost:    {dark:0.5,ghost:2,normal:0,psychic:2,bug:1,dragon:1,electric:1,fairy:1,fighting:1,fire:1,flying:1,grass:1,ground:1,ice:1,poison:1,rock:1,steel:1,water:1},
  grass:    {bug:0.5,dark:1,dragon:0.5,electric:0.5,fairy:1,fighting:1,fire:0.5,flying:0.5,ghost:1,grass:0.5,ground:2,ice:1,normal:1,poison:0.5,psychic:1,rock:2,steel:0.5,water:2},
  ground:   {bug:0.5,dark:1,dragon:1,electric:2,fairy:1,fighting:1,fire:2,flying:0,ghost:1,grass:0.5,ground:1,ice:1,normal:1,poison:2,psychic:1,rock:2,steel:2,water:1},
  ice:      {bug:1,dark:1,dragon:2,electric:1,fairy:1,fighting:0.5,fire:0.5,flying:2,ghost:1,grass:2,ground:2,ice:0.5,normal:1,poison:1,psychic:1,rock:1,steel:0.5,water:0.5},
  normal:   {bug:1,dark:1,dragon:1,electric:1,fairy:1,fighting:1,fire:1,flying:1,ghost:0,grass:1,ground:1,ice:1,normal:1,poison:1,psychic:1,rock:0.5,steel:0.5,water:1},
  poison:   {bug:1,dark:1,dragon:1,electric:1,fairy:2,fighting:1,fire:1,flying:1,ghost:0.5,grass:2,ground:0.5,ice:1,normal:1,poison:0.5,psychic:1,rock:0.5,steel:0,water:1},
  psychic:  {bug:0.5,dark:0,dragon:1,electric:1,fairy:1,fighting:2,fire:1,flying:1,ghost:1,grass:1,ground:1,ice:1,normal:1,poison:2,psychic:0.5,rock:1,steel:0.5,water:1},
  rock:     {bug:2,dark:1,dragon:1,electric:1,fairy:1,fighting:0.5,fire:2,flying:2,ghost:1,grass:1,ground:0.5,ice:2,normal:1,poison:1,psychic:1,rock:1,steel:0.5,water:1},
  steel:    {bug:1,dark:1,dragon:1,electric:0.5,fairy:2,fighting:1,fire:0.5,flying:1,ghost:1,grass:1,ground:1,ice:2,normal:1,poison:1,psychic:1,rock:2,steel:0.5,water:0.5},
  water:    {bug:1,dark:1,dragon:0.5,electric:1,fairy:1,fighting:1,fire:2,flying:1,ghost:1,grass:0.5,ground:2,ice:1,normal:1,poison:1,psychic:1,rock:2,steel:1,water:0.5},
};

// Pokemon GO search string type names (English)
const searchNames = {
  bug:'bug',dark:'dark',dragon:'dragon',electric:'electric',fairy:'fairy',
  fighting:'fighting',fire:'fire',flying:'flying',ghost:'ghost',grass:'grass',
  ground:'ground',ice:'ice',normal:'normal',poison:'poison',psychic:'psychic',
  rock:'rock',steel:'steel',water:'water'
};

// TYPE COLORS for tags
const typeColors = {
  bug:'#8cb230',dark:'#58575f',dragon:'#0f6ac0',electric:'#eed535',fairy:'#ed6ec7',
  fighting:'#c12239',fire:'#fd7d24',flying:'#748fc9',ghost:'#4a3f9f',grass:'#5db025',
  ground:'#d3a343',ice:'#61cec0',normal:'#9da0aa',poison:'#a552cc',psychic:'#ea5c8e',
  rock:'#b69e31',steel:'#417d9a',water:'#4a90d9'
};

// ===== STATE =====
let selectedTypes = [];
let mode = 'both'; // 'both' or 'superonly'
let generatedStrings = ['','','',''];

// ===== BUILD UI =====
const grid = document.getElementById('typeGrid');
ALL_TYPES.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'type-btn';
  btn.dataset.type = t;
  btn.textContent = t.charAt(0).toUpperCase() + t.slice(1);
  btn.onclick = () => toggleType(t);
  grid.appendChild(btn);
});

function toggleType(t) {
  if (selectedTypes.includes(t)) {
    selectedTypes = selectedTypes.filter(x => x !== t);
  } else {
    if (selectedTypes.length >= 2) selectedTypes.shift();
    selectedTypes.push(t);
  }
  updateSelectedDisplay();
}

function updateSelectedDisplay() {
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.classList.toggle('active', selectedTypes.includes(btn.dataset.type));
  });
}

function setMode(btn) {
  mode = btn.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function reset() {
  selectedTypes = [];
  updateSelectedDisplay();
  generatedStrings = ['','',''];
  document.getElementById('pkmnSelect').value = '';
  ['outCard1','outCard2','outCard3','outCard4'].forEach(id => document.getElementById(id).classList.remove('visible'));
}

// ===== CALCULATE EFFECTIVENESS =====
function getEffectiveness(attackType, defTypes) {
  // In PoGo, 0x (immune) becomes 0.39x — but for search string purposes we include it
  // We treat 0 as still "technically hits" — include in not very effective
  let mult = 1;
  defTypes.forEach(dt => {
    const m = chart[attackType]?.[dt] ?? 1;
    mult *= (m === 0 ? 0.39 : m); // PoGo immunity workaround
  });
  return mult;
}

function generate() {
  if (selectedTypes.length === 0) {
    alert('Please select at least one defending type!');
    return;
  }

  const defTypes = selectedTypes;
  const superEff = [];
  const effective = [];

  ALL_TYPES.forEach(atk => {
    const mult = getEffectiveness(atk, defTypes);
    if (defTypes.length === 2) {
      // dual: 4x = super (2*2), 2x = effective if mode=both
      if (mult >= 3.9) superEff.push(atk);
      if (mult >= 1.55 && mode === 'both') effective.push(atk);
    } else {
      // mono: 2x = super, 1x = normal (skip), 0.5x = resist
      if (mult >= 1.9) superEff.push(atk);
      // For mono there's no middle tier that makes sense for "effective"
      // but we still show it if mode=both (same as PokeString)
    }
  });

  // Build search strings (PoGo uses "attack:[type]" format)
  // Actually PoGo search for type effectiveness isn't by attack type name —
  // PokeString generates a string of Pokemon names filtered by type.
  // The actual PoGo search string for "attacks that are effective" is:
  // @attack-type-name (filters your pokemon by their attack type)
  // e.g.  @fire&@rock means pokemon with fire OR rock fast/charged moves
  // The correct format for PoGo is: @fire,@rock,@water
  // (comma = OR in PoGo search)

  const buildString = (types) => {
    if (types.length === 0) return '(none)';
    return [
      types.map(t => `@1${searchNames[t]}`).join(','),
      types.map(t => `@2${searchNames[t]}`).join(','),
      types.map(t => `@3${searchNames[t]}`).join(',')
    ].join(',');
  };

  const s1 = buildString(superEff);
  const s2 = effective.length > 0 ? buildString(effective) : '';

  generatedStrings[0] = s1;
  generatedStrings[1] = s2;
  generatedStrings[2] = '';
  generatedStrings[3] = '';

  // Show super effective output only if there are results
  const card1 = document.getElementById('outCard1');
  if (superEff.length > 0) {
    card1.classList.add('visible');
    document.getElementById('outTitle1').textContent =
      defTypes.length === 2 ? 'Double Super Effective (4×)' : 'Super Effective (2×)';
    document.getElementById('outTypes1').innerHTML = superEff.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    document.getElementById('outString1').textContent = s1;
  } else {
    card1.classList.remove('visible');
  }

  // Show effective output if mode=both and dual type
  const card2 = document.getElementById('outCard2');
  if (mode === 'both' && defTypes.length === 2 && effective.length > 0) {
    card2.classList.add('visible');
    document.getElementById('outTitle2').textContent = 'Effective (1.6×)';
    document.getElementById('outTypes2').innerHTML = effective.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    document.getElementById('outString2').textContent = s2;
  } else {
    card2.classList.remove('visible');
  }

  // ===== OPTIMAL: effective moves AND resists defender types =====
  // A pokemon type qualifies if it resists at least one defender type
  // and is NOT 2x weak to any defender type
  const resistTypes = ALL_TYPES.filter(pokeType => {
    let resistsAtLeastOne = false;
    let doubleWeak = false;
    defTypes.forEach(defType => {
      // chart[defType][pokeType] = damage multiplier when defType attacks pokeType
      const dmg = chart[defType]?.[pokeType] ?? 1;
      const pogoDmg = dmg === 0 ? 0.39 : dmg;
      if (pogoDmg <= 0.625) resistsAtLeastOne = true;
      if (pogoDmg >= 2) doubleWeak = true;
    });
    return resistsAtLeastOne && !doubleWeak;
  });

  const card3 = document.getElementById('outCard3');
  const moveStr = effective.length > 0 ? s2 : s1; // use broadest move set
  if (resistTypes.length > 0 && moveStr !== '(none)') {
    card3.classList.add('visible');
    document.getElementById('outTitle3').textContent = 'Optimal Attackers (effective moves + bulk)';
    document.getElementById('outTypes3').innerHTML = resistTypes.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    const resistStr = resistTypes.map(t => `@${searchNames[t]}`).join(',');
    const optimalStr = `(${moveStr})&(${resistStr})`;
    generatedStrings[2] = optimalStr;
    document.getElementById('outString3').textContent = optimalStr;
  } else {
    card3.classList.remove('visible');
  }

  // ===== DYNAMAX DEFENSIVE: Pokemon that resist the boss's STAB moves =====
  // Only type-based, no move filter — for tanking the defensive phase
  const card4 = document.getElementById('outCard4');
  if (resistTypes.length > 0) {
    card4.classList.add('visible');
    document.getElementById('outTypes4').innerHTML = resistTypes.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    const dynStr = resistTypes.map(t => `@${searchNames[t]}`).join(',');
    generatedStrings[3] = dynStr;
    document.getElementById('outString4').textContent = dynStr;
  } else {
    card4.classList.remove('visible');
  }

  // Scroll to output
  card1.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyString(n) {
  const str = generatedStrings[n - 1];
  if (!str || str === '(none)') return;
  navigator.clipboard.writeText(str).then(() => {
    const btn = document.querySelectorAll('.copy-btn')[n - 1];
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy to Clipboard';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>

  if (selectedTypes.includes(t)) {
    selectedTypes = selectedTypes.filter(x => x !== t);
  } else {
    if (selectedTypes.length >= 2) selectedTypes.shift();
    selectedTypes.push(t);
  }
  updateSelectedDisplay();
}

  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.classList.toggle('active', selectedTypes.includes(btn.dataset.type));

// ===== CALCULATE EFFECTIVENESS =====
function getEffectiveness(attackType, defTypes) {
  // In PoGo, 0x (immune) becomes 0.39x — but for search string purposes we include it
  // We treat 0 as still "technically hits" — include in not very effective
  let mult = 1;
  defTypes.forEach(dt => {
    const m = chart[attackType]?.[dt] ?? 1;
    mult *= (m === 0 ? 0.39 : m); // PoGo immunity workaround
  });
  return mult;
}

function generate() {
  if (selectedTypes.length === 0) {
    alert('Please select at least one defending type!');
    return;
  }

  const defTypes = selectedTypes;
  const superEff = [];
  const effective = [];

  ALL_TYPES.forEach(atk => {
    const mult = getEffectiveness(atk, defTypes);
    if (defTypes.length === 2) {
      // dual: 4x = super (2*2), 2x = effective if mode=both
      if (mult >= 3.9) superEff.push(atk);
      if (mult >= 1.55 && mode === 'both') effective.push(atk);
    } else {
      // mono: 2x = super, 1x = normal (skip), 0.5x = resist
      if (mult >= 1.9) superEff.push(atk);
      // For mono there's no middle tier that makes sense for "effective"
      // but we still show it if mode=both (same as PokeString)
    }
  });

  // Build search strings (PoGo uses "attack:[type]" format)
  // Actually PoGo search for type effectiveness isn't by attack type name —
  // PokeString generates a string of Pokemon names filtered by type.
  // The actual PoGo search string for "attacks that are effective" is:
  // @attack-type-name (filters your pokemon by their attack type)
  // e.g.  @fire&@rock means pokemon with fire OR rock fast/charged moves
  // The correct format for PoGo is: @fire,@rock,@water
  // (comma = OR in PoGo search)

  const buildString = (types) => {
    if (types.length === 0) return '(none)';
    return [
      types.map(t => `@1${searchNames[t]}`).join(','),
      types.map(t => `@2${searchNames[t]}`).join(','),
      types.map(t => `@3${searchNames[t]}`).join(',')
    ].join(',');
  };

  const s1 = buildString(superEff);
  const s2 = effective.length > 0 ? buildString(effective) : '';

  generatedStrings[0] = s1;
  generatedStrings[1] = s2;
  generatedStrings[2] = '';
  generatedStrings[3] = '';

  // Show super effective output only if there are results
  const card1 = document.getElementById('outCard1');
  if (superEff.length > 0) {
    card1.classList.add('visible');
    document.getElementById('outTitle1').textContent =
      defTypes.length === 2 ? 'Double Super Effective (4×)' : 'Super Effective (2×)';
    document.getElementById('outTypes1').innerHTML = superEff.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    document.getElementById('outString1').textContent = s1;
  } else {
    card1.classList.remove('visible');
  }

  // Show effective output if mode=both and dual type
  const card2 = document.getElementById('outCard2');
  if (mode === 'both' && defTypes.length === 2 && effective.length > 0) {
    card2.classList.add('visible');
    document.getElementById('outTitle2').textContent = 'Effective (1.6×)';
    document.getElementById('outTypes2').innerHTML = effective.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    document.getElementById('outString2').textContent = s2;
  } else {
    card2.classList.remove('visible');
  }

  // ===== OPTIMAL: effective moves AND resists defender types =====
  // A pokemon type qualifies if it resists at least one defender type
  // and is NOT 2x weak to any defender type
  const resistTypes = ALL_TYPES.filter(pokeType => {
    let resistsAtLeastOne = false;
    let doubleWeak = false;
    defTypes.forEach(defType => {
      // chart[defType][pokeType] = damage multiplier when defType attacks pokeType
      const dmg = chart[defType]?.[pokeType] ?? 1;
      const pogoDmg = dmg === 0 ? 0.39 : dmg;
      if (pogoDmg <= 0.625) resistsAtLeastOne = true;
      if (pogoDmg >= 2) doubleWeak = true;
    });
    return resistsAtLeastOne && !doubleWeak;
  });

  const card3 = document.getElementById('outCard3');
  const moveStr = effective.length > 0 ? s2 : s1; // use broadest move set
  if (resistTypes.length > 0 && moveStr !== '(none)') {
    card3.classList.add('visible');
    document.getElementById('outTitle3').textContent = 'Optimal Attackers (effective moves + bulk)';
    document.getElementById('outTypes3').innerHTML = resistTypes.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    const resistStr = resistTypes.map(t => `@${searchNames[t]}`).join(',');
    const optimalStr = `(${moveStr})&(${resistStr})`;
    generatedStrings[2] = optimalStr;
    document.getElementById('outString3').textContent = optimalStr;
  } else {
    card3.classList.remove('visible');
  }

  // ===== DYNAMAX DEFENSIVE: Pokemon that resist the boss's STAB moves =====
  // Only type-based, no move filter — for tanking the defensive phase
  const card4 = document.getElementById('outCard4');
  if (resistTypes.length > 0) {
    card4.classList.add('visible');
    document.getElementById('outTypes4').innerHTML = resistTypes.map(t =>
      `<span class="type-tag" style="color:${typeColors[t]};border-color:${typeColors[t]}">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`
    ).join('');
    const dynStr = resistTypes.map(t => `@${searchNames[t]}`).join(',');
    generatedStrings[3] = dynStr;
    document.getElementById('outString4').textContent = dynStr;
  } else {
    card4.classList.remove('visible');
  }

  // Scroll to output
  card1.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyString(n) {
  const str = generatedStrings[n - 1];
  if (!str || str === '(none)') return;
  navigator.clipboard.writeText(str).then(() => {
    const btn = document.querySelectorAll('.copy-btn')[n - 1];
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy to Clipboard';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
